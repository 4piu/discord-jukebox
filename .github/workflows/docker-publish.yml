name: Build and Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or tag) to build'
        required: true
        default: 'main'
      version:
        description: 'Version to tag the image with (e.g. 1.0.2 or v1.0.2)'
        required: true
      latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Determine image tags
        id: tags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = 'release' ]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="${{ inputs.version }}"
          fi
          TAG="v${RAW_VERSION#v}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Version $TAG is not in vX.Y.Z or vX.Y.Z-suffix format."
            exit 1
          fi
          SANITIZED_TAG="${TAG#v}"

          if [ "${{ github.event_name }}" = 'release' ]; then
            # GitHub's "Set as the latest release" checkbox isn't exposed on the
            # release webhook payload (make_latest is a write-only API param), so
            # fall back to the one real signal available: don't tag a prerelease
            # as latest.
            LATEST_ENABLED=${{ github.event.release.prerelease == false }}
          else
            LATEST_ENABLED=${{ inputs.latest }}
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sanitized_tag=$SANITIZED_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_enabled=$LATEST_ENABLED" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.tags.outputs.tag }}
            type=raw,value=${{ steps.tags.outputs.sanitized_tag }}
            type=raw,value=latest,enable=${{ steps.tags.outputs.latest_enabled }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate deployment artifact
        env:
          TAG: ${{ steps.tags.outputs.tag }}
          SANITIZED_TAG: ${{ steps.tags.outputs.sanitized_tag }}
          LATEST_ENABLED: ${{ steps.tags.outputs.latest_enabled }}
        run: |
          IMAGE_TAGS="${TAG},${SANITIZED_TAG}"
          if [ "$LATEST_ENABLED" = 'true' ]; then
            IMAGE_TAGS="${IMAGE_TAGS},latest"
          fi
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAGS}" > deployment-info.txt
          echo "Digest: ${{ steps.build-push.outputs.digest }}" >> deployment-info.txt

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v6
        with:
          name: deployment-info
          path: deployment-info.txt
