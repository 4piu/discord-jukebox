name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.2 or v1.0.2)'
        required: true
      target:
        description: 'Branch or commit to tag'
        required: false
        default: 'main'
      prerelease:
        description: 'Mark as a pre-release'
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Normalize tag
        id: tag
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION#v}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Version $TAG is not in vX.Y.Z or vX.Y.Z-suffix format."
            exit 1
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Uses the default GITHUB_TOKEN, which means the resulting "release
      # published" event will NOT trigger docker-publish.yml (GitHub Actions
      # doesn't chain workflow runs off the default token, to prevent
      # infinite loops) - run that workflow manually afterwards.
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ inputs.target }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
